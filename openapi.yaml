openapi: 3.0.3
info:
  title: Invoice & Payment Service API
  description: |
    Dodo Payments take-home — Invoice & Payment Service.

    **Postman:** Import `postman/Invoice-Payment-Service.postman_collection.json`.
    Run folder **00 - Setup** → **First API Key - POST /bootstrap**, then **01 - Happy Path** in order.
    Collection variables: `baseUrl`, `pspBaseUrl`, `apiKey`, `customerId`, `invoiceId`, `webhookUrl`.

    **Auth:** `Authorization: Bearer <api_key>` on all routes except `GET /health` and `POST /bootstrap`.

    **First API key:** `POST /bootstrap` (no auth). With `BOOTSTRAP_ALLOW_FORCE=true`, revokes active keys and mints a new one.
    Optional: `TEST API KEY` in docker logs on first empty DB only.

    **Rotate:** `POST /api-keys` + optional `revoke_key_id`, or `DELETE /api-keys/{id}`. Revoked keys → `401`.

    **Money:** integer cents (`int64`); server computes invoice totals.

    **Pay:** `Idempotency-Key` required; 10s PSP timeout; invoice must be `open`.

    **Webhooks:** Register `POST /webhook-endpoints`. Events `invoice.created`, `invoice.paid`,
    `invoice.payment_failed` — async POST with `X-Webhook-Signature` (HMAC-SHA256) and `X-Webhook-Timestamp`.
    Up to 5 delivery attempts (~2.5h). See `API.md` § Webhooks.

    **Mock PSP:** `http://localhost:9090` — `tok_success` (200), `tok_network_error` (500 intentional).

    **Ports:** API 8080, PSP 9090, Postgres host 5433. Curl examples: `API.md`.
  version: 1.0.0
  contact:
    name: Invoice Service

servers:
  - url: http://localhost:8080
    description: Local API (docker compose)
  - url: http://localhost:9090
    description: Mock PSP (from host / curl)

tags:
  - name: Health
    description: Liveness check; no authentication.
  - name: API Keys
    description: Bootstrap first key, create/rotate/revoke business API keys.
  - name: Customers
    description: Create and fetch customers scoped to the authenticated business.
  - name: Invoices
    description: Draft invoices, finalize, void, list; server computes totals in cents.
  - name: Payments
    description: Pay open invoices via mock PSP; idempotency and row locking.
  - name: Webhooks
    description: Register callback URLs; signed async delivery on invoice events.
  - name: Mock PSP
    description: Direct mock processor endpoints (normally called by the API, not clients).

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      description: Returns service liveness. No Bearer token. Postman folder **00 - Setup** → **Health Check**.
      security: []
      responses:
        '200':
          description: Service is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /bootstrap:
    post:
      tags: [API Keys]
      summary: Bootstrap first API key (no auth)
      operationId: bootstrapAPIKey
      security: []
      description: |
        Creates the first API key when no active keys exist. No Bearer token required.
        Returns 409 if an active key already exists. Use POST /api-keys to rotate after bootstrap.
      responses:
        '201':
          description: First API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreated'
        '409':
          description: Active API key already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /api-keys:
    post:
      tags: [API Keys]
      summary: Create API key
      operationId: createAPIKey
      description: |
        **Requires Bearer token** (bootstrap key from seed logs, or a prior key).
        Creates a new business API key (secret shown once). Optional `revoke_key_id` revokes the old key in the same request for rotation.
        The first key is **not** created here — see seed `TEST API KEY` in API logs when `SEED_DATA=true`.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAPIKeyRequest'
      responses:
        '201':
          description: API key created (secret shown once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreated'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [API Keys]
      summary: List API keys
      operationId: listAPIKeys
      description: Lists API keys for the authenticated business (prefix only; no secrets).
      responses:
        '200':
          description: API keys without secrets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke API key
      operationId: revokeAPIKey
      description: Sets `revoked_at`; that key immediately returns 401 on all routes.
      parameters:
        - $ref: '#/components/parameters/UuidPathId'
      responses:
        '200':
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyRevoked'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/AlreadyRevoked'

  /customers:
    post:
      tags: [Customers]
      summary: Create customer
      operationId: createCustomer
      description: Creates a customer for the authenticated business.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Customers]
      summary: List customers
      operationId: listCustomers
      description: Lists customers for the authenticated business.
      responses:
        '200':
          description: Customer list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /customers/{id}:
    get:
      tags: [Customers]
      summary: Get customer by ID
      operationId: getCustomer
      parameters:
        - $ref: '#/components/parameters/UuidPathId'
      responses:
        '200':
          description: Customer found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices:
    post:
      tags: [Invoices]
      summary: Create invoice (draft)
      operationId: createInvoice
      description: Server computes total_cents. Dispatches webhook invoice.created asynchronously.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      tags: [Invoices]
      summary: List invoices
      operationId: listInvoices
      parameters:
        - name: state
          in: query
          description: Filter by invoice state
          schema:
            type: string
            enum: [draft, open, paid, void, uncollectible]
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice by ID
      operationId: getInvoice
      parameters:
        - $ref: '#/components/parameters/UuidPathId'
      responses:
        '200':
          description: Invoice with line items and customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/finalize:
    post:
      tags: [Invoices]
      summary: Finalize invoice (draft → open)
      operationId: finalizeInvoice
      parameters:
        - $ref: '#/components/parameters/UuidPathId'
      responses:
        '200':
          description: Invoice finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidTransition'

  /invoices/{id}/void:
    post:
      tags: [Invoices]
      summary: Void invoice (draft or open → void)
      operationId: voidInvoice
      parameters:
        - $ref: '#/components/parameters/UuidPathId'
      responses:
        '200':
          description: Invoice voided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidTransition'

  /invoices/{id}/pay:
    post:
      tags: [Payments]
      summary: Pay invoice
      operationId: payInvoice
      description: |
        Requires Idempotency-Key. Invoice must be `open`.
        PSP timeout 10s. On failure invoice stays `open`.
      parameters:
        - $ref: '#/components/parameters/UuidPathId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayInvoiceRequest'
      responses:
        '200':
          description: Payment succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaySuccessResponse'
        '202':
          description: Idempotent replay — payment still pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayPendingResponse'
        '402':
          description: Payment failed (PSP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PayFailedResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/InvalidState'
        '422':
          $ref: '#/components/responses/IdempotencyConflict'

  /webhook-endpoints:
    post:
      tags: [Webhooks]
      summary: Register webhook endpoint
      operationId: createWebhookEndpoint
      description: |
        Requires Bearer token. Body `url` must start with `http`.
        Response includes `secret` once — store it to verify `X-Webhook-Signature` (HMAC-SHA256 of raw JSON body).

        Events (async, non-blocking): `invoice.created`, `invoice.paid`, `invoice.payment_failed`.
        Payload shape: `{ "event", "created_at", "data" }`.
        Headers on delivery: `X-Webhook-Signature: sha256=<hex>`, `X-Webhook-Timestamp: <unix>`.
        Retries: immediate, +30s, +5m, +30m, +2h (5 attempts total).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookRequest'
      responses:
        '201':
          description: Webhook endpoint created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Webhooks]
      summary: List webhook endpoints
      operationId: listWebhookEndpoints
      description: Lists registered URLs for the business. Does not return signing secrets.
      responses:
        '200':
          description: Webhook endpoints (no secret)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookEndpointListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Business API key from seed logs or POST /api-keys (revoked keys return 401)

  parameters:
    UuidPathId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: Unique key per logical payment attempt

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    CreateAPIKeyRequest:
      type: object
      properties:
        revoke_key_id:
          type: string
          format: uuid
          description: Optional. Revoke this key after creating the new one (rotation).

    APIKeyCreated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        key_prefix:
          type: string
        api_key:
          type: string
          description: Full secret; shown only once
        token_type:
          type: string
          example: Bearer
        authorization:
          type: string
          description: Ready-to-use Authorization header value
          example: Bearer sk_abc123...
        created_at:
          type: string
          format: date-time
        message:
          type: string

    APIKeyRevoked:
      type: object
      properties:
        id:
          type: string
          format: uuid
        revoked_at:
          type: string
          format: date-time
        message:
          type: string

    APIKeyListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        key_prefix:
          type: string
        revoked_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    APIKeyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/APIKeyListItem'
        count:
          type: integer

    ErrorBody:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: bad_request
            message:
              type: string
              example: Invalid JSON body

    CreateCustomerRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
          example: Alice Smith
        email:
          type: string
          format: email
          example: alice@example.com

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CustomerListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
        count:
          type: integer

    LineItemInput:
      type: object
      required: [description, quantity, unit_amount_cents]
      properties:
        description:
          type: string
        quantity:
          type: integer
          format: int64
          minimum: 1
        unit_amount_cents:
          type: integer
          format: int64
          minimum: 1
          description: Price per unit in cents (must be positive)

    LineItem:
      allOf:
        - $ref: '#/components/schemas/LineItemInput'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            invoice_id:
              type: string
              format: uuid
            created_at:
              type: string
              format: date-time

    CreateInvoiceRequest:
      type: object
      required: [customer_id, due_date, line_items]
      properties:
        customer_id:
          type: string
          format: uuid
        due_date:
          type: string
          format: date
          example: '2025-12-31'
        line_items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/LineItemInput'

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        business_id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        state:
          type: string
          enum: [draft, open, paid, void, uncollectible]
        due_date:
          type: string
          format: date-time
        total_cents:
          type: integer
          format: int64
          description: Server-computed sum of line items
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/LineItem'
        customer:
          $ref: '#/components/schemas/Customer'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InvoiceListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Invoice'
        count:
          type: integer

    PayInvoiceRequest:
      type: object
      required: [card_token]
      properties:
        card_token:
          type: string
          description: Mock PSP token
          enum:
            - tok_success
            - tok_insufficient_funds
            - tok_card_declined
            - tok_timeout
            - tok_network_error
          example: tok_success

    PaySuccessResponse:
      type: object
      properties:
        status:
          type: string
          example: succeeded
        payment_attempt_id:
          type: string
          format: uuid
        psp_reference:
          type: string

    PayPendingResponse:
      type: object
      properties:
        status:
          type: string
          example: pending
        message:
          type: string
          example: payment is being processed

    PayFailedResponse:
      type: object
      properties:
        status:
          type: string
          example: failed
        code:
          type: string
          example: card_declined
          description: timeout, network_error, insufficient_funds, card_declined, etc.

    CreateWebhookRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
          example: https://webhook.site/your-uuid

    WebhookEndpointCreated:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        secret:
          type: string
          description: Shown only once
        created_at:
          type: string
          format: date-time

    WebhookEndpointListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        business_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    WebhookEndpointListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEndpointListItem'
        count:
          type: integer

    MockPSPChargeRequest:
      type: object
      required: [card_token, amount_cents, currency, invoice_id]
      properties:
        card_token:
          type: string
        amount_cents:
          type: integer
          format: int64
        currency:
          type: string
          example: usd
        invoice_id:
          type: string

    MockPSPChargeResponse:
      type: object
      properties:
        status:
          type: string
          enum: [succeeded, failed]
        psp_ref:
          type: string
        code:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    InvalidState:
      description: Invalid invoice state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    InvalidTransition:
      description: Invalid state transition
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    IdempotencyConflict:
      description: Idempotency key reused with different body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    AlreadyRevoked:
      description: API key already revoked
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

security:
  - BearerAuth: []
